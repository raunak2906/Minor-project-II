
<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>NovaMart - Online Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#2563eb;
      --primary-soft:#eff6ff;
      --primary-dark:#1d4ed8;
      --accent:#f97316;
      --bg:#f9fafb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --radius:1rem;
      --shadow:0 18px 45px rgba(15,23,42,0.08);
      --transition:all .25s ease;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Poppins",sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--text);
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    img{
      max-width:100%;
      display:block;
    }

    .container{
      width:100%;
      max-width:1180px;
      margin:0 auto;
      padding:0 1.2rem;
    }

    /* HEADER */
    header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(249,250,251,0.96);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(209,213,219,0.8);
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0.8rem 10;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:0.5rem;
      font-size:1.25rem;
      font-weight:700;
      letter-spacing:0.05em;
    }

    .logo-icon{
      width:28px;
      height:28px;
      border-radius:999px;
      background:linear-gradient(135deg,#2563eb,#38bdf8);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#ffffff;
      font-size:0.9rem;
      box-shadow:0 0 0 3px #eff6ff;
    }

    .logo span{
      color:#2563eb;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:1.3rem;
      font-size:0.9rem;
    }

    .nav-links a{
      position:relative;
      color:var(--muted);
      font-weight:500;
    }

    .nav-links a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-4px;
      width:0;
      height:2px;
      background:var(--primary);
      transition:width .25s ease;
    }

    .nav-links a:hover{
      color:var(--text);
    }

    .nav-links a:hover::after{
      width:100%;
    }

    .nav-actions{
      display:flex;
      align-items:center;
      gap:0.75rem;
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;
      padding:0.5rem 1.1rem;
      border-radius:999px;
      font-size:0.85rem;
      font-weight:500;
      display:inline-flex;
      align-items:center;
      gap:0.3rem;
      white-space:nowrap;
      transition:var(--transition);
    }

    .btn-outline{
      background:#ffffff;
      border:1px solid #e5e7eb;
      color:var(--muted);
    }

    .btn-outline:hover{
      border-color:var(--primary);
      color:var(--primary);
      background:#eff6ff;
    }

    .btn-primary{
      background:var(--primary);
      color:#ffffff;
      box-shadow:0 10px 30px rgba(37,99,235,0.35);
    }

    .btn-primary:hover{
      background:var(--primary-dark);
      box-shadow:0 14px 36px rgba(37,99,235,0.45);
      transform:translateY(-1px);
    }

    .cart{
      position:relative;
      font-size:1.2rem;
      cursor:pointer;
    }

    .cart-badge{
      position:absolute;
      top:-6px;
      right:-8px;
      width:18px;
      height:18px;
      background:var(--accent);
      color:#ffffff;
      font-size:0.65rem;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      font-weight:600;
    }

    .hamburger{
      display:none;
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid #e5e7eb;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      background:#ffffff;
    }

    .hamburger span{
      width:18px;
      height:2px;
      background:#111827;
      position:relative;
      transition:var(--transition);
    }

    .hamburger span::before,
    .hamburger span::after{
      content:"";
      position:absolute;
      left:0;
      width:18px;
      height:2px;
      background:#111827;
      transition:var(--transition);
    }

    .hamburger span::before{ top:-6px; }
    .hamburger span::after{ top:6px; }

    .hamburger.active span{
      background:transparent;
    }

    .hamburger.active span::before{
      top:0;
      transform:rotate(45deg);
    }

    .hamburger.active span::after{
      top:0;
      transform:rotate(-45deg);
    }

    /* MOBILE SLIDE MENU */
    .mobile-menu{
      display:none;
      position:fixed;
      inset:56px 0 0 0;
      background:#ffffff;
      border-top:1px solid #e5e7eb;
      box-shadow:0 18px 40px rgba(15,23,42,0.09);
      padding:1rem 1.25rem 1.6rem;
      z-index:40;
      transform:translateY(-100%);
      opacity:0;
      transition:var(--transition);
    }

    .mobile-menu.open{
      transform:translateY(0);
      opacity:1;
    }

    .mobile-menu a{
      display:block;
      padding:0.6rem 0;
      border-bottom:1px solid #f3f4f6;
      font-size:0.92rem;
      color:var(--muted);
    }

    .mobile-menu a:last-child{
      border-bottom:none;
    }

    .mobile-menu a:hover{
      color:var(--primary);
    }

    .mobile-menu-actions{
      margin-top:1.1rem;
      display:flex;
      gap:0.6rem;
      flex-wrap:wrap;
    }

    .mobile-menu-actions .btn{
      flex:1 1 48%;
      justify-content:center;
    }

    /* HERO */
    .hero{
      padding:2.2rem 0 2rem;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.3fr 1.1fr;
      gap:2.1rem;
      align-items:center;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:0.4rem;
      padding:0.18rem 0.55rem;
      border-radius:999px;
      background:#e0f2fe;
      color:#0369a1;
      font-size:0.75rem;
      margin-bottom:0.9rem;
    }

    .eyebrow-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:#22c55e;
    }

    .hero h1{
      font-size:2.3rem;
      line-height:1.2;
      margin-bottom:0.7rem;
	  
    }

    .hero h1 span{
      color:var(--primary);
    }

    .hero-sub{
      font-size:0.96rem;
      color:var(--muted);
      max-width:470px;
      margin-bottom:1.3rem;
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:0.75rem;
      margin-bottom:1.5rem;
    }

    .hero-meta{
      display:flex;
      flex-wrap:wrap;
      gap:1.4rem;
      font-size:0.8rem;
      color:var(--muted);
    }

    .hero-meta strong{
      display:block;
      font-size:1rem;
      color:var(--text);
    }

    .hero-card{
		background:linear-gradient(135deg,#eff6ff,#ffffff); 
      <!-- background:linear-gradient(135deg,#2e27ab,#bc68da); -->
	  <!-- background: linear-gradient(to bottom, #2e27ab, #bc68da); -->
      border-radius:1.4rem;
      padding:1.3rem 1.3rem 1.1rem;
      box-shadow:var(--shadow);
      border:1px solid #e0e7ff;
      position:relative;
      overflow:hidden;
    }

    .hero-chip{
      position:absolute;
      top:1.1rem;
      left:1.1rem;
      padding:0.25rem 0.7rem;
      font-size:0.72rem;
      border-radius:999px;
      background:#1d4ed8;
      color:#e0f2fe;
      z-index:2;
    }

    .hero-price{
      position:absolute;
      bottom:1.1rem;
      right:1.1rem;
      padding:0.5rem 0.9rem;
      border-radius:999px;
      background:#ffffff;
      border:1px solid #e5e7eb;
      font-size:0.9rem;
      font-weight:600;
      color:var(--text);
      box-shadow:0 12px 30px rgba(15,23,42,0.12);
      z-index:2;
    }

    /* HERO SLIDER */
    .hero-slider{
      margin-top:0.6rem;
      border-radius:1rem;
      overflow:hidden;
      position:relative;
      background:#f3f4f6;
    }

    .hero-slider-track{
      display:flex;
      width:300%;
      animation:heroSlide 12s infinite;
    }

    .hero-slide{
      min-width:100%;
      height:230px;
      position:relative;
    }

    .hero-slide img{
      width:416.8px;
      height:100%;
      object-fit:cover;
    }

    .hero-slide-badge{
      position:absolute;
      bottom:0.9rem;
      left:0.9rem;
      padding:0.3rem 0.7rem;
      border-radius:999px;
      background:rgba(17,24,39,0.75);
      color:#e5e7eb;
      font-size:0.7rem;
    }

    @keyframes heroSlide{
      0%, 25%{ transform:translateX(0%); }
      35%, 60%{ transform:translateX(-100%); }
      70%, 95%{ transform:translateX(-200%); }
      100%{ transform:translateX(0%); }
    }

    /* SECTION + CATEGORIES */
    .section{
      padding:1.6rem 0 2.1rem;
    }

    .section-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:1rem;
    }

    .section-title{
      font-size:1rem;
      font-weight:600;
    }

    .section-sub{
      font-size:0.82rem;
      color:var(--muted);
    }

    .cat-row{
      display:flex;
      flex-wrap:wrap;
      gap:0.6rem;
      margin-top:0.4rem;
    }

    .chip{
      padding:0.35rem 0.85rem;
      border-radius:999px;
      border:1px solid #e5e7eb;
      font-size:0.78rem;
      color:var(--muted);
      background:#ffffff;
      cursor:pointer;
      transition:var(--transition);
    }

    .chip.active,
    .chip:hover{
      border-color:var(--primary);
      color:var(--primary);
      background:var(--primary-soft);
    }

    /* PRODUCT GRID */
    .product-grid{
      margin-top:1.1rem;
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:1.1rem;
    }

    .product-card{
      background:var(--card);
      border-radius:var(--radius);
      padding:0.85rem;
      border:1px solid #e5e7eb;
      box-shadow:0 10px 30px rgba(15,23,42,0.04);
      display:flex;
      flex-direction:column;
      gap:0.35rem;
      cursor:pointer;
      transition:var(--transition);
      position:relative;
      overflow:hidden;
    }

    .product-card:hover{
      transform:translateY(-3px);
      box-shadow:0 18px 40px rgba(15,23,42,0.08);
      border-color:#d1d5db;
    }

    .product-img{
      border-radius:0.8rem;
      overflow:hidden;
      margin-bottom:0.5rem;
      background:#f3f4f6;
      position:relative;
	  
    }

    /* HOVER ZOOM EFFECT */
    .product-img img{
      transition:transform .35s ease;
      transform-origin:center;
    }

    .product-card:hover .product-img img{
      transform:scale(1.06);
    }

    .product-info{
      display:flex;
      flex-direction:column;
      gap:0.12rem;
    }

    .product-name{
      font-size:0.9rem;
      font-weight:500;
    }

    .product-brand{
      font-size:0.75rem;
      color:var(--muted);
    }

    .rating{
      font-size:0.72rem;
      color:#f59e0b;
    }

    .product-bottom{
      margin-top:0.35rem;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:0.4rem;
    }

    .price{
      font-size:0.94rem;
      font-weight:600;
    }

    .price small{
      margin-left:0.25rem;
      font-size:0.78rem;
      color:var(--muted);
      text-decoration:line-through;
      font-weight:400;
    }

    .add-btn{
      border:none;
      outline:none;
      padding:0.32rem 0.75rem;
      border-radius:999px;
      font-size:0.75rem;
      font-weight:500;
      display:inline-flex;
      align-items:center;
      gap:0.3rem;
      cursor:pointer;
      background:var(--primary-soft);
      color:var(--primary-dark);
      transition:var(--transition);
      white-space:nowrap;
    }

    .add-btn:hover{
      background:var(--primary);
      color:#ffffff;
      box-shadow:0 10px 28px rgba(37,99,235,0.35);
      transform:translateY(-1px);
    }

    /* CTA / NEWSLETTER */
    .cta-row{
      margin-top:1.4rem;
      padding:1.4rem 1.3rem;
      border-radius:1rem;
      background:linear-gradient(135deg,#eff6ff,#e0f2fe);
      border:1px solid #bfdbfe;
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:1rem;
    }

    .cta-row h3{
      font-size:1rem;
      margin-bottom:0.2rem;
    }

    .cta-row p{
      font-size:0.8rem;
      color:var(--muted);
    }

    .cta-inputs{
      display:flex;
      flex-wrap:wrap;
      gap:0.6rem;
    }

    .cta-inputs input{
      padding:0.5rem 0.7rem;
      min-width:220px;
      border-radius:999px;
      border:1px solid #d1d5db;
      outline:none;
      background:#ffffff;
      font-size:0.8rem;
    }

    .cta-inputs button{
      border:none;
      outline:none;
      border-radius:999px;
      padding:0.5rem 1rem;
      background:var(--accent);
      color:#ffffff;
      font-weight:600;
      font-size:0.8rem;
      cursor:pointer;
      transition:var(--transition);
    }

    .cta-inputs button:hover{
      filter:brightness(1.05);
      transform:translateY(-1px);
    }

    /* FOOTER */
    footer{
      padding:1.3rem 0 1.7rem;
      font-size:0.78rem;
      color:var(--muted);
    }

    .footer-flex{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:0.9rem;
    }

    .footer-links{
      display:flex;
      gap:0.9rem;
      flex-wrap:wrap;
    }

    /* RESPONSIVE */
    @media (max-width:992px){
      .hero-grid{
        grid-template-columns:1fr;
        gap:1.6rem;
      }
      .hero-card{
        max-width:460px;
        margin:0 auto;
      }
      .product-grid{
        grid-template-columns:repeat(3,minmax(0,1fr));
      }
    }

    @media (max-width:768px){
      .nav-links{
        display:none;
      }
      .hamburger{
        display:flex;
      }
      .mobile-menu{
        display:block;
      }
      .hero{
        padding-top:1.8rem;
      }
      .hero h1{
        font-size:2rem;
      }
      .product-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }
      .cta-row{
        padding:1.2rem 1.1rem;
      }
    }

    @media (max-width:540px){
      .container{
        padding:0 1rem;
      }
      .hero-actions{
        flex-direction:column;
        align-items:flex-start;
      }
      .product-grid{
        grid-template-columns:1fr;
      }
      .cta-inputs{
        flex-direction:column;
        width:100%;
      }
      .cta-inputs input,
      .cta-inputs button{
        width:100%;
      }
	  
	  .hero-slide img{
      width:30%;
     
    }
    }
	.gradient-text {
  background: linear-gradient(to bottom, #2e27ab, #bc68da);
  -webkit-background-clip: text;
  color: transparent;
  font-weight: bold;
}

  padding:1rem 1.25rem 1.6rem;

  opacity:1;

</style>

  <!-- JS: MOBILE MENU -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');

  if (!hamburger || !mobileMenu) {
    console.warn("Hamburger or mobileMenu element not found");
    return;
  }

  // init aria
  hamburger.setAttribute('aria-expanded', 'false');
  mobileMenu.setAttribute('aria-hidden', 'true');

  function openMenu() {
    mobileMenu.classList.add('open');
    hamburger.classList.add('active');
    hamburger.setAttribute('aria-expanded', 'true');
    mobileMenu.setAttribute('aria-hidden', 'false');
    // optional: prevent background scroll
    document.documentElement.style.overflow = 'hidden';
  }

  function closeMenu() {
    mobileMenu.classList.remove('open');
    hamburger.classList.remove('active');
    hamburger.setAttribute('aria-expanded', 'false');
    mobileMenu.setAttribute('aria-hidden', 'true');
    document.documentElement.style.overflow = '';
  }

  hamburger.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = mobileMenu.classList.toggle('open');
    // Ensure consistent active class and aria
    hamburger.classList.toggle('active', isOpen);
    hamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    mobileMenu.setAttribute('aria-hidden', isOpen ? 'false' : 'true');

    // Prevent page scroll when open
    document.documentElement.style.overflow = isOpen ? 'hidden' : '';
  });

  // Close on click outside
  document.addEventListener('click', (e) => {
    if (!mobileMenu.contains(e.target) && !hamburger.contains(e.target) && mobileMenu.classList.contains('open')) {
      closeMenu();
    }
  });

  // Close on ESC
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && mobileMenu.classList.contains('open')) {
      closeMenu();
    }
  });

  // Optional: close on resize > mobile breakpoint
  window.addEventListener('resize', () => {
    if (window.innerWidth > 768 && mobileMenu.classList.contains('open')) {
      closeMenu();
    }
  });
});
</script>
