{% extends "layout.html" %}
{% block body %}

<div class="container" style="text-align: center; padding: 4rem 1rem;">
    <div
        style="background: #ecfdf5; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
        <span style="font-size: 2.5rem;">✅</span>
    </div>

    <h1 style="color: var(--primary-dark); margin-bottom: 1rem;">Order Placed Successfully!</h1>
    <p style="color: var(--muted); margin-bottom: 2rem; max-width: 500px; margin-left: auto; margin-right: auto;">
        Thank you for your purchase. Your order has been confirmed and will be shipped soon.
    </p>

    <div style="display: flex; gap: 1rem; justify-content: center;">
        <a href="/dashboard"><button class="btn btn-outline">View Order</button></a>
        <a href="/shop"><button class="btn btn-primary">Continue Shopping</button></a>
    </div>
</div>

{% endblock %}
