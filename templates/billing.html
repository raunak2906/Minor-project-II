{% extends "layout.html" %}
{% block body %}

<div class="container" style="max-width: 600px; margin: 3rem auto;">
    <div
        style="background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--border);">
        <h2 style="color: var(--primary-dark); margin-bottom: 1.5rem; text-align: center;">Shipping Details</h2>

        <form action="{{ action_url }}" method="POST">
            <div style="margin-bottom: 1.2rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Full Name</label>
                <input type="text" name="name" required
                    style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 0.5rem;">
            </div>

            <div style="margin-bottom: 1.2rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Address</label>
                <textarea name="address" rows="3" required
                    style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 0.5rem;"></textarea>
            </div>

            <div style="margin-bottom: 1.2rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Mobile Number</label>
                <input type="tel" name="mobile" required pattern="[0-9]{10}" placeholder="10-digit mobile number"
                    style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 0.5rem;">
            </div>

            <input type="hidden" name="amount" value="{{ amount }}">
            <!-- If single item buy -->
            {% if product_id %}
            <input type="hidden" name="product_id" value="{{ product_id }}">
            {% endif %}

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 1rem; font-size: 1.1rem; margin-top: 1rem;">Continue to Payment</button>
        </form>
    </div>
</div>

{% endblock %}
