{% extends "layout.html" %}

{% block body %}
<div class="container" style="padding-top: 4rem; padding-bottom: 4rem; max-width: 800px;">

    <div style="text-align: center; margin-bottom: 3rem;">
        <h1
            style="font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; background: linear-gradient(135deg, #1d4ed8, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            Master Dashboard</h1>
        <p style="color: var(--muted); font-size: 1.1rem;">Manage your product inventory</p>
    </div>

    <div class="card"
        style="background: white; border-radius: 24px; padding: 2.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05);">
        <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid #f3f4f6; padding-bottom: 1rem;">
            Add New Product</h2>

        <form action="/master/add_product" method="POST" enctype="multipart/form-data">

            <div style="display: grid; gap: 1.5rem;">

                <!-- Product Name -->
                <div class="form-group">
                    <label for="name"
                        style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text);">Product
                        Name</label>
                    <input type="text" id="name" name="name" required placeholder="e.g. Wireless Headphones"
                        style="width: 100%; padding: 0.8rem 1rem; border-radius: 12px; border: 1px solid #e5e7eb; font-size: 1rem; outline: none; transition: all 0.2s;">
                </div>

                <!-- Price -->
                <div class="form-group">
                    <label for="price"
                        style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text);">Price
                        (₹)</label>
                    <input type="number" id="price" name="price" required placeholder="e.g. 2999"
                        style="width: 100%; padding: 0.8rem 1rem; border-radius: 12px; border: 1px solid #e5e7eb; font-size: 1rem; outline: none; transition: all 0.2s;">
                </div>

                <!-- Detail -->
                <div class="form-group">
                    <label for="detail"
                        style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text);">Description/Details</label>
                    <textarea id="detail" name="detail" required rows="4" placeholder="Product description..."
                        style="width: 100%; padding: 0.8rem 1rem; border-radius: 12px; border: 1px solid #e5e7eb; font-size: 1rem; outline: none; transition: all 0.2s; resize: vertical;"></textarea>
                </div>

                <!-- Image Upload -->
                <div class="form-group">
                    <label for="image"
                        style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text);">Product
                        Image</label>
                    <div style="border: 2px dashed #cbd5e1; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.2s; background: #f8fafc;"
                        onclick="document.getElementById('image').click()">
                        <input type="file" id="image" name="image" required accept="image/*" style="display: none;"
                            onchange="previewImage(this)">
                        <span style="font-size: 2rem; display: block; margin-bottom: 0.5rem;">🖼️</span>
                        <p id="uploadText" style="color: var(--muted); margin: 0;">Click to upload image</p>
                    </div>
                    <img id="preview"
                        style="max-width: 100%; margin-top: 1rem; border-radius: 12px; display: none; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 1rem; font-size: 1.1rem; font-weight: 600; margin-top: 1rem; background: linear-gradient(135deg, #2563eb, #1d4ed8);">
                    Add Product
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function previewImage(input) {
        const preview = document.getElementById('preview');
        const uploadText = document.getElementById('uploadText');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function (e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                uploadText.innerText = input.files[0].name;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
