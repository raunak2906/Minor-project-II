{%if ('user' in session )%}
	{% extends "after_login_layout.html" %}
{%else%}
	{%extends "layout.html"%}
{%endif%}
{%block body%}

<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <title>Product Name - NovaMart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --primary:#2563eb;
      --primary-soft:#eff6ff;
      --primary-dark:#1d4ed8;
      --accent:#f97316;
      --bg:#f9fafb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --radius:1rem;
      --shadow:0 18px 45px rgba(15,23,42,0.08);
      --transition:all .25s ease;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Poppins",sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      padding: 1rem;
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .containertwo {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      color: var(--primary);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .product-page {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .product-images {
      flex: 1 1 40%;
      border-radius: 1rem;
      overflow: hidden;
      background: #f3f4f6;
      position: relative;
      min-height: 300px;
    }

    .product-images img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.35s ease;
    }

    .product-images:hover img {
      transform: scale(1.06);
    }

    .product-info {
      flex: 1 1 55%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .product-name {
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 600;
      color: var(--primary-dark);
      line-height: 1.3;
    }

    .product-brand {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 500;
    }

    .rating {
      font-size: 1rem;
      color: #f59e0b;
      font-weight: 600;
    }

    .price {
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 700;
      color: var(--primary);
      margin: 0.5rem 0;
    }

    .price small {
      margin-left: 0.8rem;
      font-size: 0.9rem;
      color: var(--muted);
      text-decoration: line-through;
      font-weight: 400;
    }

    .description {
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.6;
    }

    .button-row {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .add-to-cart-btn {
      flex: 1;
      padding: 0.85rem 1.25rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 10px 30px rgba(37,99,235,0.35);
    }

    .add-to-cart-btn:hover {
      background: var(--primary-dark);
      box-shadow: 0 14px 36px rgba(37,99,235,0.45);
      transform: translateY(-2px);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      body {
        padding: 0.5rem;
      }
      
      .containertwo {
        padding: 1.25rem 1rem;
        border-radius: 0.75rem;
      }

      .product-page {
        flex-direction: column;
        gap: 1.5rem;
      }

      .product-images {
        flex: 1 1 100%;
        min-height: 250px;
      }

      .product-info {
        flex: 1 1 100%;
        gap: 0.75rem;
      }

      .button-row {
        flex-direction: column;
      }

      .back-link {
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 0.25rem;
      }
      
      .containertwo {
        padding: 1rem 0.75rem;
        border-radius: 0.5rem;
      }

      .product-images {
        min-height: 200px;
      }

      .description {
        font-size: 0.9rem;
      }

      .add-to-cart-btn {
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
      }
    }

    /* Large screens */
    @media (min-width: 1200px) {
      .containertwo {
        padding: 2.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="containertwo">
    <a href="/shop" class="back-link">← Back to products</a>
    
    <div class="product-page">
      <div class="product-images">
        <img src="/static/img/pdimg/{{pd.sno}}/01.jpeg" alt="Product Image" />
      </div>
      
      <div class="product-info">
        <h1 class="product-name">{{pd.name}}</h1>
        <div class="product-brand">ORMA</div>
        <!-- <div class="rating">★★★★☆ · 4.4</div> -->
        <div class="price">₹{{pd.price}} <small>₹{{(pd.price+pd.price/6) | round(2)}}</small></div>
        <p class="description">
          {{pd.detail}}   
        </p>
        
        <div class="button-row">
         <a href="/billing/{{pd.sno}}"> <button class="add-to-cart-btn" type="button">Buy</button></a>
       <!-- <a href="#">   <button class="add-to-cart-btn" type="button">Add to cart</button></a> -->
        </div>
      </div>
    </div>
  </div>

</body>
</html>
{%endblock%}
